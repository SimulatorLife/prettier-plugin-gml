name: "Agent 103 - Legacy Shim Removal"
on:
  workflow_dispatch:
    inputs:
      agent:
        description: "Optional agent override."
        required: false
        default: ""
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  run:
    uses: ./.github/workflows/_agent-open-pr-and-ping.yml
    secrets: inherit
    with:
      agent: ${{ inputs.agent }}
      pr_title: "Agent: Legacy Shim Removal"
      prompt: >-
        Locate exactly one instance of legacy-support code and remove it with a forward-looking fix.
        Eligible targets include: backwards-compatibility wrappers, deprecated compatibility branches,
        pass-through re-export shims, transitional alias APIs, or adapter layers that only preserve old behavior.

        Requirements:
        - Pick one concrete instance and complete the full migration in the same PR.
        - Replace compatibility paths with the canonical long-term implementation; do not add new shims.
        - If the target is a re-export shim, remove the shim and update callers to import from the true owner directly.
        - Keep the change architecture-aligned with AGENTS.md workspace boundaries and target-state direction.
        - Update/add tests to protect the forward path and verify behavior remains correct.
        - Keep scope tight and avoid unrelated cleanup.

        In the PR/commit message, identify the removed legacy pattern, explain why it was backwards-compatibility debt,
        and show validation results (tests/lint/typecheck).
