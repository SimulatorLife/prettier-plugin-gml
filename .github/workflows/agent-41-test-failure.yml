name: "Agent 41 - Failing Test Recovery"
on:
    workflow_dispatch:
        inputs:
            agent:
                description: "Optional agent override."
                required: false
                default: ""
                type: string

permissions:
    contents: write
    pull-requests: write
    issues: write

jobs:
    check_tests:
        runs-on: ubuntu-latest
        outputs:
            tests_failed: ${{ steps.run_tests.outputs.failed }}
        steps:
            - uses: actions/checkout@v5

            - name: Read Node version from .nvmrc
              id: read-node-version
              run: echo "version=$(cat .nvmrc)" >> "$GITHUB_OUTPUT"

            - name: Use Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ steps.read-node-version.outputs.version }}

            - name: Enable pnpm via Corepack
              run: |
                  corepack enable
                  corepack prepare $(node -p "require('./package.json').packageManager") --activate

            - name: Resolve pnpm store path
              id: pnpm-store
              run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

            - name: Cache pnpm store
              uses: actions/cache@v4
              with:
                  path: ${{ steps.pnpm-store.outputs.path }}
                  key: ${{ runner.os }}-node-${{ steps.read-node-version.outputs.version }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
                  restore-keys: |
                      ${{ runner.os }}-node-${{ steps.read-node-version.outputs.version }}-pnpm-store-
                      ${{ runner.os }}-node-

            - name: Install dependencies
              run: |
                  set -o pipefail
                  install_log="$(mktemp)"
                  if pnpm install --frozen-lockfile 2>&1 | tee "$install_log"; then
                    exit 0
                  fi

                  if grep -q "ERR_PNPM_OUTDATED_LOCKFILE" "$install_log"; then
                    echo "::warning::pnpm-lock.yaml is out of date. Retrying install with --no-frozen-lockfile."
                    pnpm install --no-frozen-lockfile
                    exit 0
                  fi

                  echo "::error::Dependency install failed for a reason other than outdated lockfile."
                  exit 1

            - name: Run test suite
              id: run_tests
              run: |
                  set +e
                  pnpm test
                  status=$?
                  if [ "$status" -ne 0 ]; then
                    echo "Test suite exited with $status"
                    echo "failed=true" >> "$GITHUB_OUTPUT"
                  else
                    echo "Test suite passed"
                    echo "failed=false" >> "$GITHUB_OUTPUT"
                  fi
                  exit 0

    run:
        needs: check_tests
        if: ${{ needs.check_tests.outputs.tests_failed == 'true' }}
        uses: ./.github/workflows/_agent-open-pr-and-ping.yml
        secrets: inherit
        with:
            agent: ${{ inputs.agent }}
            pr_title: "Agent: Recover Failing Test"
            prompt: >
                There is at least one failing unit test in the codebase. Start by running the
                full automated test suite (pnpm test), then identify a single failing test
                (or the smallest cluster of related failures with a shared root cause) and
                explain the cause. Decide whether that test is still a valid expectation for
                its workspace. If the test is outdated or no longer applicable, move or
                update it with a clear justification. Otherwise, fix the implementation and
                only adjust tests when that is truly necessary. If a golden fixture encodes
                multiple formatting rules, choose one regression to address, implement the
                necessary production fix or feature for that specific case, leave the rest
                untouched, and document any remaining gaps. Never modify the existing golden
                files (*.gml). Work sequentially and strategically, making
                one targeted change at a time and re-running the full test suite after each
                change to confirm progress and prevent regressions. If your fix targets only
                part of a failing test, add a new focused test (unit or integration) that
                explicitly demonstrates the corrected behavior, but continue until the full
                suite passes. Finish with all tests passing.
