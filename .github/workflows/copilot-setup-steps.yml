name: "Copilot Setup Steps"

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Read Node version from .nvmrc
        id: node-version
        run: echo "version=$(cat .nvmrc)" >> "$GITHUB_OUTPUT"

      - name: Enable pnpm via Corepack
        run: |
          corepack enable
          corepack prepare $(node -p "require('./package.json').packageManager") --activate

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.node-version.outputs.version }}
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: |
          set -o pipefail
          install_log="$(mktemp)"
          if pnpm install --frozen-lockfile 2>&1 | tee "$install_log"; then
            exit 0
          fi

          if grep -q "ERR_PNPM_OUTDATED_LOCKFILE" "$install_log"; then
            echo "::warning::pnpm-lock.yaml is out of date. Retrying install with --no-frozen-lockfile."
            pnpm install --no-frozen-lockfile
            exit 0
          fi

          echo "::error::Dependency install failed for a reason other than outdated lockfile."
          exit 1

      - name: Build TypeScript workspaces (best effort)
        run: |
          if ! pnpm run build:ts; then
            echo "::warning::TypeScript workspace build failed; continuing environment setup."
          fi

      - name: Protect golden test fixtures (local environment)
        run: |
          echo "Protecting golden .gml test fixtures (making read-only and skip-worktree)..."
          find . -type d \( -name "node_modules" -o -name "vendor" -o -name ".git" -o -name "dist" \) -prune -o -type f -name "*.gml" -path "*/test/*" -print > .git/golden_fixtures.tmp || true
          if [ -s .git/golden_fixtures.tmp ]; then
            xargs chmod -w < .git/golden_fixtures.tmp || true
            xargs git update-index --skip-worktree < .git/golden_fixtures.tmp || true
            FILE_COUNT=$(wc -l < .git/golden_fixtures.tmp | tr -d ' ')
            echo "Successfully protected ${FILE_COUNT} golden .gml test fixtures."
            rm -f .git/golden_fixtures.tmp
          else
            echo "No golden .gml test fixtures found to protect."
          fi
