name: "Agent 42 - TODO Implementation"
on:
  workflow_dispatch:
    inputs:
      agent:
        description: "Optional agent override."
        required: false
        default: ""
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  check_todos:
    runs-on: ubuntu-latest
    outputs:
      todo_found: ${{ steps.pick_todo.outputs.todo_found }}
      todo_file: ${{ steps.pick_todo.outputs.todo_file }}
      todo_line_number: ${{ steps.pick_todo.outputs.todo_line_number }}
      todo_text: ${{ steps.pick_todo.outputs.todo_text }}
    steps:
      - uses: actions/checkout@v5

      - name: Read Node version from .nvmrc
        id: read-node-version
        run: echo "version=$(cat .nvmrc)" >> "$GITHUB_OUTPUT"

      - name: Use Node from .nvmrc
        uses: actions/setup-node@v6
        with:
          node-version: ${{ steps.read-node-version.outputs.version }}

      - name: Verify and select one outstanding TODO
        id: pick_todo
        shell: bash
        run: |
          todo_output="$(
            git grep -n -I -E '^[[:space:]]*(//|/\*|\*)[[:space:]]*TODO([[:space:]:]|$)' -- '*.ts' \
              ':!**/dist/**' \
              ':!**/*.d.ts' \
              ':!src/parser/generated/**' \
              ':!vendor/**' \
            || true
          )"

          if [ -z "$todo_output" ]; then
            echo "No tracked TODO comments were found in TypeScript source files."
            echo "todo_found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          mapfile -t todo_matches <<< "$todo_output"
          selected_index=$((RANDOM % ${#todo_matches[@]}))
          selected_match="${todo_matches[$selected_index]}"

          if [[ ! "$selected_match" =~ ^([^:]+):([0-9]+):(.*)$ ]]; then
            echo "Unable to parse TODO match: $selected_match" >&2
            exit 1
          fi

          todo_file="${BASH_REMATCH[1]}"
          todo_line_number="${BASH_REMATCH[2]}"
          todo_text="${BASH_REMATCH[3]}"
          delimiter="EOF_$(date +%s%N)"

          {
            echo "todo_found=true"
            echo "todo_file=$todo_file"
            echo "todo_line_number=$todo_line_number"
            echo "todo_text<<$delimiter"
            printf '%s\n' "$todo_text"
            echo "$delimiter"
          } >> "$GITHUB_OUTPUT"

          echo "Selected TODO: $todo_file:$todo_line_number"

  run:
    needs: check_todos
    if: ${{ needs.check_todos.outputs.todo_found == 'true' }}
    uses: ./.github/workflows/_agent-open-pr-and-ping.yml
    secrets: inherit
    with:
      agent: ${{ inputs.agent }}
      pr_title: "Agent: Implement Outstanding TODO"
      prompt: >
        Find and implement the specific outstanding TODO identified below. Treat
        the TODO comment as the task definition, implement a coherent, complete,
        clean, production change needed to satisfy it, and then update or remove the
        TODO comment so it no longer describes missing behavior. Add or adjust
        targeted tests to prove the behavior now exists, and re-run the relevant
        verification before finishing. Keep the scope tight to this single TODO
        and avoid unrelated cleanup.

        TODO location:
        `${{ needs.check_todos.outputs.todo_file }}:${{ needs.check_todos.outputs.todo_line_number }}`

        TODO text:
        `${{ needs.check_todos.outputs.todo_text }}`
