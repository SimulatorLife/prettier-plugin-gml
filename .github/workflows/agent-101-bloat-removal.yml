name: "Agent 101 - Local Bloat Trimming"
on:
  workflow_dispatch:
    inputs:
      agent:
        description: "Optional agent override."
        required: false
        default: ""
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  run:
    uses: ./.github/workflows/_agent-open-pr-and-ping.yml
    secrets: inherit
    with:
      agent: ${{ inputs.agent }}
      pr_title: "Agent: Local Bloat Trimming"
      prompt: >-
        Investigate the repository for a **single bloated implementation hotspot** inside an active feature: one
        function, call path, or tightly related module section that carries avoidable complexity.
        This workflow is not for whole-feature deletion and not for broad duplicate-code sweeps.

        Pick exactly one hotspot and trim local bloat such as:
        - parameter plumbing that forwards values unchanged across layers;
        - unused parameters in active call chains that can be removed safely;
        - redundant branch paths or state toggles that do not change supported behavior;
        - wrapper/adapter code that adds indirection without clear domain value.

        Requirements:
        - Keep behavior intact and preserve the existing workspace architecture described in `AGENTS.md` and `README.md`.
        - Do not remove top-level workspaces, documented CLI commands, or golden fixtures.
        - Keep scope narrow: one hotspot, one cohesive refactor, no opportunistic cleanup in unrelated files.
        - Prefer edits that reduce local surface area (fewer parameters, branches, temporary states, or handoffs) over moving code around.
        - If you remove a parameter/path, update all call sites and relevant tests in the same change.
        - Explain why this is "local bloat trimming" rather than DRY deduplication or dead-code deletion.

        In the PR summary, include before/after evidence for the chosen hotspot (for example parameter count,
        branch count, or lines touched) and confirm test/lint/typecheck results.
