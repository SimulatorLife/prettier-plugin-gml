name: "Agent 93 – Refactor Engine Enhancements"

on:
  workflow_dispatch:
    inputs:
      agent:
        description: "Optional agent override."
        required: false
        default: ""
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  run:
    uses: ./.github/workflows/_agent-hot-feature-base.yml
    secrets: inherit
    with:
      agent: ${{ inputs.agent }}
      component: "refactor engine (src/refactor)"
      extra_context: >
        Focus on advancing the '@gml-modules/refactor' workspace ('src/refactor'). The target state for this workspace is a 'codemod' module for executing complex, project-aware refactors (think 'JSCodeshift' or 'recast'). 
        Work on expanding and improving semantic-safe structural transformations—such as renaming variables/symbols globally, moving or renaming assets and files, and coordinating large-scale logic shifts that go far beyond 
        local linting fixes or layout formatting. Every change must remain highly performant, avoiding redundant analysis passes, full-graph sweeps, or excessive bookkeeping that degrade incremental speed. 
        Coordinate with the core and semantic packages where necessary, relying on established AST traversal utilities and existing semantic indices rather than introducing parallel logic. Add targeted, low-cost 
        tests that lock in project-wide codemod execution and behavioral correctness without materially expanding the testing overhead of the refactoring system.
